plugins {
    id 'java'
    id 'io.github.freehij.mcartifact'
}

group = 'io.github.example'
version = project.mod_version

repositories {
    mavenCentral()
    maven { url = 'https://jitpack.io' }
}

dependencies {
    compileOnly 'com.github.freehij:javaagent-modloader:main-SNAPSHOT'
}

mcartifact {
    version = project.minecraft_version
    environment = project.environment
}